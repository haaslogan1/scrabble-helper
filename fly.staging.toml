app = "scrabble-helper-staging"
primary_region = "iad"

[build]

[env]
  BASE_URL = "https://scrabble-helper-staging.fly.dev"
  FRONTEND_URL = "https://scrabble-helper-staging.fly.dev"
  COOKIE_SECURE = "true"
  DEV_AUTH_BYPASS = "false"
  DATABASE_URL = "sqlite:////data/scrabble.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health?db=1"
    timeout = "5s"

[[mounts]]
  source = "scrabble_helper_staging_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
